apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: 519763206721.dkr.ecr.ap-south-1.amazonaws.com/auth-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: MONGO_URI
          value: mongodb://mongo:27017/authdb
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: streaming-app-secrets
              key: JWT_SECRET
