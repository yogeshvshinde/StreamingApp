apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: 519763206721.dkr.ecr.ap-south-1.amazonaws.com/admin-service:latest
        ports:
        - containerPort: 3003
        env:
        - name: MONGO_URI
          value: mongodb://mongo:27017/admindb
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: streaming-app-secrets
              key: JWT_SECRET
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: streaming-app-secrets
              key: AWS_REGION
        - name: AWS_S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: streaming-app-secrets
              key: AWS_S3_BUCKET
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: streaming-app-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: streaming-app-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_CDN_URL
          valueFrom:
            secretKeyRef:
              name: streaming-app-secrets
              key: AWS_CDN_URL
              optional: true
